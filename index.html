<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP 下載頁</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #e0f2ff, #f7f9fc);
      color: #222;
    }

    .container {
      max-width: 420px;
      margin: 40px auto;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      padding: 28px 22px;
      text-align: center;
    }

    .app-icon {
      width: 96px;
      height: 96px;
      margin: 0 auto 16px;
      border-radius: 22px;
      background: #4f8cff;
      color: white;
      font-size: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(79,140,255,0.35);
    }

    h1 {
      margin: 8px 0;
      font-size: 28px;
    }

    .version {
      color: #666;
      margin-bottom: 18px;
      font-size: 15px;
    }

    .desc {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
      margin-bottom: 24px;
      text-align: left;
    }

    .download-btn {
      display: inline-block;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      background: #2f7df6;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s;
    }

    .download-btn:hover {
      background: #1f6ae0;
    }

    .section {
      margin-top: 28px;
      text-align: left;
    }

    .section h2 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .section ul {
      padding-left: 20px;
      color: #444;
      line-height: 1.8;
      font-size: 15px;
    }

    .notice {
      margin-top: 22px;
      padding: 14px;
      background: #fff7e8;
      border-radius: 12px;
      color: #8a5a00;
      font-size: 14px;
      line-height: 1.7;
      text-align: left;
    }

    .footer {
      margin-top: 24px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-icon">📱</div>
    <h1>我的 APP</h1>
    <div class="version">版本：v1.0.0</div>

    <div class="desc">
      這是我的 Android 應用程式下載頁。<br>
      點擊下面按鈕即可下載 APK 安裝檔。
    </div>

    <a class="download-btn"
      href="https://github.com/DGC-LK/my-app-download/releases/download/v1.0/app-release.apk"
      download
      target="_blank">
      下載 APK
    </a>

    <div class="section">
      <h2>功能介紹</h2>
      <ul>
        <li>支援 Android 手機安裝</li>
        <li>操作簡單，直接下載即可</li>
        <li>版本更新後可重新下載安裝</li>
      </ul>
    </div>

    <div class="section">
      <h2>安裝說明</h2>
      <ul>
        <li>下載 APK 後，點擊檔案開始安裝</li>
        <li>若系統阻擋，請允許安裝未知來源應用</li>
        <li>安裝完成後即可開啟使用</li>
      </ul>
    </div>

    <div class="notice">
      注意：部分手機第一次安裝 APK 時，會提示安全警告。<br>
      這是 Android 的正常保護機制，確認來源可信即可安裝。
    </div>

    <div class="footer">
      © 2026 My App Download Page
    </div>
  </div>

  <script>
    document.getElementById("downloadLink").href = "#";
  </script>
</body>
</html>
